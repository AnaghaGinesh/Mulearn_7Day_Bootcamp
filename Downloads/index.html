<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CiniFlix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            CiniFlix
        </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="#">TV Shows</a>
        <a href="#">My Profile</a>
    </nav>
    </header>
    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
        <source src="assets/video1.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1 id="title">Oppenheimer</h1>
            <p>
                Watch this latest blockbuster hit
            </p>
            <button class="play-btn">
               &#9654; Play
            </button>
        </div>
    </section>
<main>
    <h2>Hot Picks</h2>
    <div class="movie-grid">
        <img src="assets/Avatar.jpg" class="movie-card">
        <img src="assets/Johnwick.jpg" class="movie-card">
        <img src="assets/darkknight.jpg" class="movie-card">
        <img src="assets/1917.jpg" class="movie-card">
        <img src="assets/archer.jpg" class="movie-card">
        <img src="assets/avengers.jpg" class="movie-card">
        <img src="assets/passion.jpg" class="movie-card">
    </div>
</main>
<script src="script.js"></script>
</body>
</html>
